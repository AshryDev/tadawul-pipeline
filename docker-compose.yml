version: "3.9"

# ── Reusable anchors ──────────────────────────────────────────────────────────
x-aws-env: &aws-env
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
  AWS_REGION: ${AWS_REGION}
  S3_BUCKET_NAME: ${S3_BUCKET_NAME}

x-lakehouse-env: &lakehouse-env
  MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-admin}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-password}
  MINIO_REGION: ${MINIO_REGION:-eu-south-1}
  NESSIE_URI: ${NESSIE_URI:-http://nessie:19120/iceberg/}

x-airflow-common: &airflow-common
  build: ./airflow
  environment:
    <<: [*aws-env, *lakehouse-env]
    AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR:-LocalExecutor}
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: ${AIRFLOW__CORE__SQL_ALCHEMY_CONN}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW__CORE__LOAD_EXAMPLES:-false}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: ${AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION:-true}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
    KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
    TRINO_HOST: ${TRINO_HOST:-trino}
    TRINO_PORT: ${TRINO_PORT:-8080}
    TRINO_CATALOG: ${TRINO_CATALOG:-iceberg}
    TRINO_SCHEMA: ${TRINO_SCHEMA:-silver}
    AIRFLOW_CONN_TRINO_CONN: "trino://airflow@trino:8080"
    POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
    POSTGRES_PORT: ${POSTGRES_PORT:-5432}
    POSTGRES_USER: ${POSTGRES_USER:-airflow}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airflow}
    POSTGRES_DB: ${POSTGRES_DB:-airflow}
    SYMBOLS: ${SYMBOLS:-2222,1010,2010,7010,1120,4280,2380,8010,4003,2060}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./dbt:/opt/airflow/dbt
    - airflow_logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
    kafka:
      condition: service_healthy
  networks:
    - tadawul_net

# ── Services ──────────────────────────────────────────────────────────────────
services:

  # ── Zookeeper ───────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    hostname: zookeeper
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_MAX_CLIENT_CNXNS: 60
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - tadawul_net

  # ── Kafka ────────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    hostname: kafka
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - tadawul_net

  # ── Kafka Topic Setup (one-shot init) ────────────────────────────────────────
  kafka-setup:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-setup
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      echo 'Creating Kafka topics...'
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic tadawul.ticks         --partitions 6 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic tadawul.trades        --partitions 6 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic tadawul.orderbook     --partitions 6 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic tadawul.market_status --partitions 6 --replication-factor 1
      echo 'Topics created successfully.'
      kafka-topics --bootstrap-server kafka:29092 --list
      "
    networks:
      - tadawul_net

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15
    hostname: postgres
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airflow}
      POSTGRES_DB: ${POSTGRES_DB:-airflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-airflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - tadawul_net

  # ── Spark Master ─────────────────────────────────────────────────────────────
  spark-master:
    image: apache/spark:latest
    hostname: spark-master
    container_name: spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    environment:
      <<: *lakehouse-env
      SPARK_MASTER_OPTS: "-Dspark.deploy.defaultCores=2"
    volumes:
      - ./spark/jars:/opt/spark/jars/extra
      - ./spark/streaming_consumer.py:/opt/spark-app/streaming_consumer.py
      - spark_checkpoints:/tmp/spark-checkpoints
    ports:
      - "8081:8080"
      - "7077:7077"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - tadawul_net

  # ── Spark Worker ─────────────────────────────────────────────────────────────
  spark-worker:
    image: apache/spark:latest
    hostname: spark-worker
    container_name: spark-worker
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker",
              "--memory", "2g", "--cores", "2", "spark://spark-master:7077"]
    environment:
      <<: *lakehouse-env
    volumes:
      - ./spark/jars:/opt/spark/jars/extra
      - spark_checkpoints:/tmp/spark-checkpoints
    depends_on:
      spark-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - tadawul_net

  # ── Airflow Init ─────────────────────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init
        airflow users create \
          --username ${AIRFLOW_ADMIN_USERNAME:-admin} \
          --password ${AIRFLOW_ADMIN_PASSWORD:-admin} \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email ${AIRFLOW_ADMIN_EMAIL:-admin@tadawul.local}
        echo "Airflow initialized."
    restart: on-failure

  # ── Airflow Webserver ────────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "9093:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Airflow Scheduler ────────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      airflow-webserver:
        condition: service_healthy
    restart: unless-stopped

  # ── Trino ────────────────────────────────────────────────────────────────────
  trino:
    image: trinodb/trino:455
    hostname: trino
    container_name: trino
    volumes:
      - ./trino/catalog:/etc/trino/catalog
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/info"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - tadawul_net

  # ── MinIO (S3-compatible object store) ───────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"  # MinIO S3 API
      - "9001:9001"  # MinIO Web Console
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    volumes:
      - minio_data:/data
    networks:
      - tadawul_net
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
      
  # ── MinIO bucket bootstrap ───────────────────────────────────────────────────
  minio-setup:
    image: minio/mc:latest
    container_name: minio-setup
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - tadawul_net
    entrypoint: >
      /bin/sh -c "
        mc alias set s3 http://minio:9000 admin password &&
        mc mb --ignore-existing s3/stocks &&
        echo 'MinIO bucket stocks ready.'
      "
    restart: "no"

  # ── Nessie (Iceberg catalog with Git-like branching) ─────────────────────────
  nessie:
    image: ghcr.io/projectnessie/nessie:0.104.2
    container_name: nessie
    ports:
      - "19120:19120"  # Nessie API + Iceberg REST
      - "9002:9000"    # Quarkus management (health/metrics)
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./nessie/application.properties:/deployments/config/application.properties:ro
    environment:
      - nessie.version.store.type=MONGODB
      - quarkus.mongodb.database=nessie
      - quarkus.mongodb.connection-string=mongodb://root:password@mongo:27017
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/q/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - tadawul_net
  
  # ── MongoDB (Nessie catalog backend) ─────────────────────────────────────────
  mongo:
    image: mongo
    container_name: mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - tadawul_net

  # ── dbt (transformation layer) ───────────────────────────────────────────────
  dbt:
    build: ./dbt
    container_name: dbt
    command: ["tail", "-f", "/dev/null"]   # keep container alive for docker exec
    volumes:
      - ./dbt:/usr/.dbt
      - C:/Users/lenovo/.dbt:/root/.dbt           # Windows
      # - /Users/ahmedashry/.dbt:/root/.dbt         # macOS
      # - /home/ashryman/.dbt:/root/.dbt             # Linux
      - ./dbt/dbt-data:/usr/dbt/target
    depends_on:
      trino:
        condition: service_healthy
      nessie:
        condition: service_healthy
    networks:
      - tadawul_net


# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  tadawul_net:
    driver: bridge

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  airflow_logs:
  spark_checkpoints:
  kafka_data:
  zookeeper_data:
  zookeeper_log:
  minio_data:
  mongo_data: