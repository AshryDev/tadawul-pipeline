tadawul:
  target: dev
  outputs:
    dev:
      type: trino
      method: none
      host: "{{ env_var('TRINO_HOST', 'localhost') }}"
      port: "{{ env_var('TRINO_PORT', '8080') | int }}"
      database: iceberg
      schema: silver
      threads: 4
      http_scheme: http
      session_properties:
        query_max_run_time: "2h"
        task_writer_count: "4"
